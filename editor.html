<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Jewelry 编辑器</title>
<link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
<style>
body, html { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.top-bar { background: #2c3e50; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.top-bar h1 { margin: 0; font-size: 18px; font-weight: 500; letter-spacing: 1px; }
.top-bar-actions { display: flex; gap: 12px; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .2s; }
.btn-download { background: #C9A96E; color: white; }
.btn-download:hover { background: #b8944f; }
.btn-preview { background: #34495e; color: white; }
.btn-preview:hover { background: #4a5f7f; }
#gjs { height: calc(100vh - 60px); }
.gjs-cv-canvas { background: #f5f5f5; }
@media (max-width: 768px) {
  .top-bar { flex-direction: column; gap: 10px; padding: 10px; }
  .top-bar h1 { font-size: 16px; }
  .btn { padding: 8px 16px; font-size: 13px; }
}
</style>
</head>
<body>
<div class="top-bar">
  <h1>✨ Azure Jewelry 编辑器</h1>
  <div class="top-bar-actions">
    <button class="btn btn-preview" onclick="previewPage()">👁️ 预览</button>
    <button class="btn btn-download" onclick="downloadPage()">💾 下载网页</button>
  </div>
</div>
<div id="gjs"></div>

<script src="https://unpkg.com/grapesjs"></script>
<script>
const editor = grapesjs.init({
  container: '#gjs',
  height: '100%',
  width: 'auto',
  storageManager: false,
  fromElement: false
});

// 直接加载 index.html 内容
fetch('index.html')
  .then(r => r.text())
  .then(html => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const styleEl = doc.querySelector('style');
    const css = styleEl ? styleEl.textContent : '';
    const bodyHTML = doc.body.innerHTML;

    editor.setStyle(css);
    editor.setComponents(bodyHTML);
  })
  .catch(err => {
    console.error('加载失败:', err);
    alert('❌ 无法加载网页内容，请刷新页面重试');
  });

function previewPage() {
  const html = generateFullHTML();
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
}

function downloadPage() {
  const html = generateFullHTML();
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'index.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  setTimeout(() => {
    alert('✅ 网页已下载！\n\n请将下载的 index.html 文件发给 Alex，他会帮您更新到网站上。');
  }, 100);
}

function generateFullHTML() {
  const css = editor.getCss();
  const html = editor.getHtml();

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Jewelry — Lab-Grown Diamond Fine Jewelry</title>
<meta name="description" content="Azure Jewelry. Lab-grown diamond fine jewelry. Dubai · Taipei · Hong Kong.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
${css}
</style>
</head>
<body>
${html}
</body>
</html>`;
}
</script>
</body>
</html>
