<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Jewelry 可视化编辑器</title>
<link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
<style>
body, html { margin: 0; height: 100%; }
#gjs { border: 3px solid #444; }
.panel__top { padding: 0; width: 100%; display: flex; position: initial; justify-content: center; justify-content: space-between; }
.panel__basic-actions { position: initial; }
.editor-row { display: flex; justify-content: flex-start; align-items: stretch; flex-wrap: nowrap; height: 100%; }
.editor-canvas { flex-grow: 1; }
.panel__right { flex-basis: 230px; position: relative; overflow-y: auto; }
.panel__switcher { position: initial; }
</style>
</head>
<body>
<div id="gjs"></div>

<script src="https://unpkg.com/grapesjs"></script>
<script>
const editor = grapesjs.init({
  container: '#gjs',
  height: '100vh',
  width: 'auto',
  storageManager: false,
  panels: { defaults: [] },

  blockManager: {
    appendTo: '.blocks-container',
  },

  styleManager: {
    appendTo: '.styles-container',
    sectors: [{
      name: '文字',
      open: true,
      buildProps: ['font-family', 'font-size', 'font-weight', 'letter-spacing', 'color', 'line-height', 'text-align']
    }, {
      name: '装饰',
      open: false,
      buildProps: ['background-color', 'border-radius', 'border', 'box-shadow', 'background']
    }, {
      name: '尺寸',
      open: false,
      buildProps: ['width', 'height', 'max-width', 'min-height', 'margin', 'padding']
    }]
  },

  layerManager: {
    appendTo: '.layers-container'
  },

  traitManager: {
    appendTo: '.traits-container',
  },

  selectorManager: {
    appendTo: '.styles-container'
  },

  panels: {
    defaults: [
      {
        id: 'panel-top',
        el: '.panel__top',
      }, {
        id: 'basic-actions',
        el: '.panel__basic-actions',
        buttons: [
          {
            id: 'visibility',
            active: true,
            className: 'btn-toggle-borders',
            label: '<svg style="width:22px;height:22px" viewBox="0 0 24 24"><path fill="currentColor" d="M15,9H9V5H15M12,19A1.5,1.5 0 0,1 10.5,17.5A1.5,1.5 0 0,1 12,16A1.5,1.5 0 0,1 13.5,17.5A1.5,1.5 0 0,1 12,19M17,3H7A2,2 0 0,0 5,5V21L12,18L19,21V5C19,3.89 18.1,3 17,3Z" /></svg>',
            command: 'sw-visibility',
          }, {
            id: 'export',
            className: 'btn-open-export',
            label: '<svg style="width:22px;height:22px" viewBox="0 0 24 24"><path fill="currentColor" d="M12.89,3L14.85,3.4L11.11,21L9.15,20.6L12.89,3M19.59,12L16,8.41V5.58L22.42,12L16,18.41V15.58L19.59,12M1.58,12L8,5.58V8.41L4.41,12L8,15.58V18.41L1.58,12Z" /></svg>',
            command: 'export-template',
          }, {
            id: 'show-json',
            className: 'btn-show-json',
            label: '💾',
            context: 'show-json',
            command(editor) {
              editor.Modal.setTitle('下载网页')
                .setContent(`<div style="padding:20px">
                  <p style="margin-bottom:15px">点击下方按钮下载编辑后的网页：</p>
                  <button id="download-btn" style="background:#C9A96E;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px">下载 index.html</button>
                </div>`)
                .open();

              setTimeout(() => {
                document.getElementById('download-btn').onclick = function() {
                  const html = editor.getHtml();
                  const css = editor.getCss();
                  const fullHtml = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Jewelry — Lab-Grown Diamond Fine Jewelry</title>
<style>${css}</style>
</head>
<body>
${html}
</body>
</html>`;

                  const blob = new Blob([fullHtml], { type: 'text/html' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url;
                  a.download = 'index.html';
                  a.click();
                  URL.revokeObjectURL(url);
                  alert('✅ 网页已下载！');
                  editor.Modal.close();
                };
              }, 100);
            },
          }
        ],
      }, {
        id: 'panel-right',
        el: '.panel__right',
        buttons: [{
          id: 'layers',
          className: 'fa fa-bars',
          command: 'open-layers',
          attributes: { title: '图层' },
        }],
      }
    ]
  },
});

// 添加面板
editor.Panels.addPanel({
  id: 'panel-right',
  el: '.panel__right',
  resizable: {
    maxDim: 350,
    minDim: 200,
    tc: 0,
    cl: 1,
    cr: 0,
    bc: 0,
  },
});

// 加载你的网站内容
fetch('index.html')
  .then(r => r.text())
  .then(html => {
    editor.setComponents(html);
  })
  .catch(() => {
    // 如果找不到 index.html，加载默认内容
    editor.setComponents(`
      <div style="background:#0A0A0A;color:#F0EDE8;font-family:'Jost',sans-serif;padding:100px 24px;text-align:center">
        <h1 style="font-size:48px;letter-spacing:8px;color:#C9A96E;margin-bottom:20px">AZURE JEWELRY</h1>
        <p style="font-size:16px;color:#B0ADA8;max-width:600px;margin:0 auto">Lab-grown diamond fine jewelry. Dubai · Taipei · Hong Kong.</p>
      </div>
    `);
  });
</script>
</body>
</html>
